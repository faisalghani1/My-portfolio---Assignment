<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="icon" type="image/x-icon" href="Portfolio_icon.png">

  </head>
  <body>
    <header>
      <h1>My Portfolio</h1>
      <nav>
        <a href="./index.html">Home</a>
        <a href="./projects.html">Projects</a>
        <a href="./contact.html">Contact</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Contact Us</h2>

        <a href="tel:+923000000000">Tel: +92 300 0000000</a><br />
        <a href="mailto:abc@gmail.com">Email: abc@gmail.com</a>

        <br /><br />

        <fieldset>
          <legend>Send us a Message</legend>

          <form>
            <label for="fname">First Name</label><br />
            <input type="text" id="fname" name="firstname" placeholder="Your name.." required />
            <br /><br />

            <label for="lname">Last Name</label><br />
            <input type="text" id="lname" name="lastname" placeholder="Your last name.." required />
            <br /><br />

            <label for="cell">Cell Number</label><br />
            <input type="tel" id="cell" name="cell" placeholder="Your phone number..." required />
            <br /><br />

            <label for="email">Email</label><br />
            <input type="email" id="email" name="email" placeholder="Your email address.." required />
            <br /><br />

            <label for="country">Country</label><br />
            <select id="country" name="country">
              <option value="Pakistan">Pakistan</option>
              <option value="India">India</option>
              <option value="Australia">Australia</option>
              <option value="Canada">Canada</option>
              <option value="USA">USA</option>
            </select>
            <br /><br />

            <label for="subject">Subject</label><br />
            <textarea id="subject" name="subject" placeholder="Write your message.." rows="4" cols="30"></textarea>

            <br /><br />

            <button type="submit">Submit</button>
          </form>
        </fieldset>
      </section>
    </main>

    <br />

    <footer>
      <p>&copy; 2026 My Portfolio | All Rights Reserved</p>
    </footer>
  </body>
</html>
